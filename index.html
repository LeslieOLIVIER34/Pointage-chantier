<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fiches de Pointage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F2F5; min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-box { background: #fff; border-radius: 16px; overflow: hidden; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
  .login-header { background: #1F3864; padding: 32px 24px 24px; text-align: center; }
  .login-header .logo { width: 56px; height: 56px; background: rgba(255,255,255,0.15); border-radius: 14px; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
  .login-header .logo svg { width: 30px; height: 30px; fill: #fff; }
  .login-header h1 { color: #fff; font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .login-header p { color: rgba(255,255,255,0.65); font-size: 13px; }
  .login-body { padding: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .form-group select, .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid #E0E0E0; border-radius: 10px; font-size: 15px; color: #1a1a1a; background: #FAFAFA; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .form-group select:focus, .form-group input:focus { border-color: #1F3864; background: #fff; }
  .btn-login { width: 100%; padding: 14px; background: #1F3864; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn-login:active { opacity: 0.85; }
  .login-error { background: #FFF0F0; color: #C0392B; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 12px; display: none; text-align: center; }

  /* ── APP SHELL ── */
  #app-screen { display: none; min-height: 100vh; flex-direction: column; }
  .topbar { background: #1F3864; padding: 14px 16px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-left h2 { color: #fff; font-size: 16px; font-weight: 600; }
  .topbar-left p { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 1px; }
  .btn-logout { background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 500; cursor: pointer; }

  .tabs { background: #fff; display: flex; border-bottom: 1.5px solid #EBEBEB; position: sticky; top: 56px; z-index: 99; }
  .tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 13px; font-weight: 500; color: #999; cursor: pointer; border-bottom: 2.5px solid transparent; transition: color 0.2s; }
  .tab.active { color: #1F3864; border-bottom-color: #1F3864; }

  .content { flex: 1; padding: 14px; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── MONTH BAR ── */
  .month-bar { display: flex; gap: 8px; margin-bottom: 14px; }
  .month-bar select { flex: 1; padding: 9px 12px; border: 1.5px solid #E0E0E0; border-radius: 10px; font-size: 14px; background: #fff; color: #1a1a1a; -webkit-appearance: none; outline: none; }

  /* ── WEEK CARD ── */
  .week-card { background: #fff; border-radius: 14px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .week-head { background: #2E75B6; color: #fff; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
  .week-head span { font-size: 13px; font-weight: 600; }
  .week-badge { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 9px; font-size: 12px; }
  .day-row { padding: 10px 14px; border-bottom: 1px solid #F5F5F5; }
  .day-row:last-child { border-bottom: none; }
  .day-row.saturday { background: #FFFBF0; }
  .day-row.outside { opacity: 0.4; }
  .day-label { font-size: 13px; font-weight: 600; color: #1F3864; margin-bottom: 8px; }
  .day-label.sat-lbl { color: #B8860B; }
  .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 7px; }
  .fields-row input, .field-full input { width: 100%; padding: 9px 11px; border: 1.5px solid #E8E8E8; border-radius: 8px; font-size: 13px; color: #1a1a1a; background: #FAFAFA; outline: none; }
  .fields-row input:focus, .field-full input:focus { border-color: #2E75B6; background: #fff; }
  .field-full { margin-bottom: 7px; }
  .field-full:last-child { margin-bottom: 0; }
  .panier-row { display: flex; align-items: center; gap: 8px; }
  .panier-row input[type=checkbox] { width: 18px; height: 18px; accent-color: #1F3864; cursor: pointer; }
  .panier-row label { font-size: 13px; color: #555; cursor: pointer; }

  /* ── TOTAL BAR ── */
  .week-total-bar { background: #1E6B3C; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
  .week-total-bar span { color: #fff; font-size: 13px; font-weight: 600; }

  /* ── SAVE ── */
  .save-area { padding: 14px; background: #F0F2F5; position: sticky; bottom: 0; }
  .btn-save { width: 100%; padding: 15px; background: #1E6B3C; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
  .btn-save:active { opacity: 0.85; }
  .btn-save:disabled { opacity: 0.5; }
  .save-status { text-align: center; font-size: 13px; margin-top: 8px; min-height: 18px; }
  .save-status.ok { color: #1E6B3C; }
  .save-status.err { color: #C0392B; }
  .save-status.loading { color: #888; }

  /* ── RECAP ── */
  .recap-card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .recap-card h3 { font-size: 14px; font-weight: 600; color: #1F3864; margin-bottom: 12px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0; }
  .stat-box { background: #F5F7FB; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-val { font-size: 26px; font-weight: 700; color: #1F3864; }
  .stat-lbl { font-size: 11px; color: #888; margin-top: 2px; }
  .week-row-recap { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F5F5F5; font-size: 13px; }
  .week-row-recap:last-child { border-bottom: none; }
  .week-row-recap .wlbl { color: #555; }
  .week-row-recap .wval { font-weight: 600; color: #1F3864; }

  /* ── ADMIN ── */
  .admin-month-bar { display: flex; gap: 8px; margin-bottom: 14px; }
  .admin-month-bar select { flex: 1; padding: 9px 12px; border: 1.5px solid #E0E0E0; border-radius: 10px; font-size: 14px; background: #fff; -webkit-appearance: none; outline: none; }
  .emp-card { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: pointer; }
  .emp-card-head { display: flex; justify-content: space-between; align-items: center; }
  .emp-name { font-size: 14px; font-weight: 600; color: #1F3864; }
  .emp-stats { font-size: 12px; color: #888; margin-top: 3px; }
  .emp-arrow { color: #CCC; font-size: 18px; }
  .emp-detail { display: none; margin-top: 12px; border-top: 1px solid #F0F0F0; padding-top: 12px; }
  .emp-detail.open { display: block; }
  .detail-row { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px solid #F8F8F8; }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .dlbl { color: #888; }
  .detail-row .dval { font-weight: 500; color: #333; }
  .codes-card { background: #fff; border-radius: 14px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .code-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #F5F5F5; }
  .code-row:last-child { border-bottom: none; }
  .code-name { font-size: 13px; color: #333; }
  .code-val { font-family: monospace; font-size: 14px; font-weight: 600; color: #1F3864; background: #EEF2FF; border-radius: 6px; padding: 3px 10px; }

  .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 999; font-size: 14px; color: #555; display: none; }

  @media (min-width: 480px) {
    .login-box { margin: auto; }
    #app-screen { max-width: 480px; margin: 0 auto; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-header">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      </div>
      <h1>Fiches de Pointage</h1>
      <p>Connectez-vous avec votre code</p>
    </div>
    <div class="login-body">
      <div class="form-group">
        <label>Votre nom</label>
        <select id="sel-name">
          <option value="">-- Sélectionnez --</option>
          <option>LEGRAND G</option>
          <option>Martinez Kevin</option>
          <option>Galiano Nicolas</option>
          <option>Philouze Lucas</option>
          <option>THOUVENEL A</option>
          <option>RICHARD M</option>
          <option>DACRUZ Joao</option>
          <option>LEAL François</option>
          <option>BOUZARAOUTA Saïd</option>
          <option>LIGNON Dylan</option>
          <option>BOUDIER Jason</option>
          <option value="ADMIN">-- Responsable --</option>
        </select>

      <div class="form-group">
        <label>Code d'accès</label>

</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <h2 id="tb-name">—</h2>
      <p id="tb-month">—</p>
    </div>
    <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
  </div>

  <div class="tabs" id="tabs-bar">
    <div class="tab active" data-tab="saisie" onclick="switchTab('saisie')">Saisie</div>
    <div class="tab" data-tab="recap" onclick="switchTab('recap')">Récap</div>
  </div>

  <div class="content">
    <!-- SAISIE -->
    <div id="pane-saisie" class="tab-pane active">
      <div class="month-bar">
        <select id="sel-month" onchange="onMonthChange()"></select>
        <select id="sel-year" onchange="onMonthChange()">
          <option value="2026">2026</option>
          <option value="2027">2027</option>
        </select>
      </div>
      <div id="weeks-container"></div>
    </div>

    <!-- RECAP -->
    <div id="pane-recap" class="tab-pane">
      <div id="recap-container"></div>
    </div>

    <!-- ADMIN SALARIÉS -->
    <div id="pane-admin" class="tab-pane">
      <div class="admin-month-bar">
        <select id="adm-month" onchange="loadAdmin()"></select>
        <select id="adm-year" onchange="loadAdmin()">
          <option value="2026">2026</option>
          <option value="2027">2027</option>
        </select>
      </div>
      <div id="admin-list"></div>
    </div>

    <!-- ADMIN CODES -->
    <div id="pane-codes" class="tab-pane">
      <div class="codes-card" id="codes-list"></div>
    </div>
  </div>

  <div class="save-area" id="save-area">
    <button class="btn-save" id="btn-save" onclick="saveData()">Enregistrer</button>
    <div class="save-status" id="save-status"></div>
  </div>
</div>

<div class="loading-overlay" id="loader">Chargement…</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIGURATION — remplacez par vos vraies valeurs Supabase
// ═══════════════════════════════════════════════════════
const SUPABASE_URL  = 'VOTRE_URL_SUPABASE';   // ex: https://xxxx.supabase.co
const SUPABASE_KEY  = 'VOTRE_CLE_ANON';       // clé anon/public

// ═══════════════════════════════════════════════════════
//  DONNÉES LOCALES
// ═══════════════════════════════════════════════════════
const EMPLOYEES = [
  'LEGRAND G','Martinez Kevin','Galiano Nicolas','Philouze Lucas',
  'THOUVENEL A','RICHARD M','DACRUZ Joao','LEAL François',
  'BOUZARAOUTA Saïd','LIGNON Dylan','BOUDIER Jason'
];

const CODES = {
  'LEGRAND G':'1001','Martinez Kevin':'1002','Galiano Nicolas':'1003',
  'Philouze Lucas':'1004','THOUVENEL A':'1005','RICHARD M':'1006',
  'DACRUZ Joao':'1007','LEAL François':'1008','BOUZARAOUTA Saïd':'1009',
  'LIGNON Dylan':'1010','BOUDIER Jason':'1011','ADMIN':'9999'
};

const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin',
              'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const JOURS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

// ═══════════════════════════════════════════════════════
//  ÉTAT
// ═══════════════════════════════════════════════════════
let currentUser = null;
let isAdmin = false;
let currentMonth = new Date().getMonth() + 1;
let currentYear  = new Date().getFullYear();

// ═══════════════════════════════════════════════════════
//  SUPABASE HELPERS
// ═══════════════════════════════════════════════════════
async function sbFetch(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if (!r.ok) { const t = await r.text(); throw new Error(t); }
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

async function loadEntries(employee, year, month) {
  const rows = await sbFetch(
    `pointage?employee=eq.${encodeURIComponent(employee)}&year=eq.${year}&month=eq.${month}&select=*`
  );
  const map = {};
  (rows||[]).forEach(r => { map[r.day_key] = r; });
  return map;
}

async function upsertEntries(entries) {
  if (!entries.length) return;
  await sbFetch('pointage', 'POST', entries);
}

async function loadAllEntries(year, month) {
  return await sbFetch(
    `pointage?year=eq.${year}&month=eq.${month}&select=*`
  );
}

// ═══════════════════════════════════════════════════════
//  SEMAINES
// ═══════════════════════════════════════════════════════
function getWeeks(year, month) {
  const weeks = [];
  const first = new Date(year, month-1, 1);
  let start = new Date(first);
  const dow = start.getDay();
  start.setDate(start.getDate() - (dow === 0 ? 6 : dow - 1));
  while (true) {
    const days = [];
    for (let i=0; i<6; i++) { const d=new Date(start); d.setDate(start.getDate()+i); days.push(d); }
    if (days.some(d => d.getMonth()+1 === month)) weeks.push(days);
    start.setDate(start.getDate()+7);
    if (start.getMonth()+1 > month && start.getFullYear() >= year) break;
  }
  return weeks;
}

function fmt(d) { return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'}); }

// ═══════════════════════════════════════════════════════
//  INIT SELECTS
// ═══════════════════════════════════════════════════════
function initSelects() {
  ['sel-month','adm-month'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = MOIS.map((m,i)=>`<option value="${i+1}" ${i+1===currentMonth?'selected':''}>${m}</option>`).join('');
  });
}

// ═══════════════════════════════════════════════════════
//  LOGIN / LOGOUT
// ═══════════════════════════════════════════════════════
document.getElementById('inp-code').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogin() {
  const name = document.getElementById('sel-name').value;
  const code = document.getElementById('inp-code').value.trim();
  const err  = document.getElementById('login-error');
  if (!name) { showErr('Sélectionnez votre nom.'); return; }
  if (CODES[name] !== code) { showErr('Code incorrect. Réessayez.'); return; }
  err.style.display = 'none';
  currentUser = name;
  isAdmin = (name === 'ADMIN');
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display   = 'flex';
  document.getElementById('tb-name').textContent = isAdmin ? 'Administration' : name;
  initSelects();
  if (isAdmin) setupAdminTabs();
  else setupUserTabs();
}

function showErr(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function doLogout() {
  currentUser = null; isAdmin = false;
  document.getElementById('inp-code').value = '';
  document.getElementById('sel-name').value = '';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

// ═══════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════
function setupUserTabs() {
  document.getElementById('tabs-bar').innerHTML = `
    <div class="tab active" onclick="switchTab('saisie')">Saisie</div>
    <div class="tab" onclick="switchTab('recap')">Récapitulatif</div>`;
  document.getElementById('save-area').style.display = 'block';
  switchTab('saisie');
}

function setupAdminTabs() {
  document.getElementById('tabs-bar').innerHTML = `
    <div class="tab active" onclick="switchTab('admin')">Salariés</div>
    <div class="tab" onclick="switchTab('codes')">Codes d'accès</div>`;
  document.getElementById('save-area').style.display = 'none';
  switchTab('admin');
  renderCodes();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = isAdmin ? ['admin','codes'] : ['saisie','recap'];
    t.classList.toggle('active', tabs[i] === name);
  });
  ['saisie','recap','admin','codes'].forEach(p => {
    const el = document.getElementById('pane-'+p);
    if (el) el.classList.toggle('active', p === name);
  });
  if (name==='saisie') renderWeeks();
  if (name==='recap')  renderRecap();
  if (name==='admin')  loadAdmin();
}

function onMonthChange() {
  currentMonth = parseInt(document.getElementById('sel-month').value);
  currentYear  = parseInt(document.getElementById('sel-year').value);
  document.getElementById('tb-month').textContent = MOIS[currentMonth-1]+' '+currentYear;
  renderWeeks();
}

// ═══════════════════════════════════════════════════════
//  SAISIE
// ═══════════════════════════════════════════════════════
async function renderWeeks() {
  document.getElementById('tb-month').textContent = MOIS[currentMonth-1]+' '+currentYear;
  showLoader(true);
  let saved = {};
  try { saved = await loadEntries(currentUser, currentYear, currentMonth); } catch(e) {}
  showLoader(false);

  const weeks = getWeeks(currentYear, currentMonth);
  let html = '';
  weeks.forEach((days, wi) => {
    const lun = days[0], ven = days[4];
    html += `<div class="week-card">
      <div class="week-head">
        <span>Sem. du ${fmt(lun)} au ${fmt(ven)}</span>
        <span class="week-badge" id="wtot-${wi}">0h</span>
      </div>`;
    days.forEach((day, di) => {
      const inMonth = day.getMonth()+1 === currentMonth;
      const isSat   = di === 5;
      const dkey    = `${wi}-${di}`;
      const sv      = saved[dkey] || {};
      html += `<div class="day-row${isSat?' saturday':''}${!inMonth?' outside':''}">
        <div class="day-label${isSat?' sat-lbl':''}">${JOURS[di]} ${fmt(day)}</div>
        <div class="fields-row">
          <input type="number" min="0" max="24" step="0.5" placeholder="Heures" id="h-${wi}-${di}" value="${sv.heures||''}" oninput="updateTotal(${wi})">
          <div class="panier-row">
            <input type="checkbox" id="p-${wi}-${di}" ${sv.panier?'checked':''}>
            <label for="p-${wi}-${di}">Panier repas</label>
          </div>
        </div>
        <div class="field-full"><input type="text" placeholder="Nom du chantier" id="c-${wi}-${di}" value="${sv.chantier||''}"></div>
        <div class="field-full"><input type="text" placeholder="Détail des travaux" id="d-${wi}-${di}" value="${sv.detail||''}"></div>
      </div>`;
    });
    html += `<div class="week-total-bar"><span>Total semaine</span><span id="wtot2-${wi}">0h</span></div></div>`;
  });

  document.getElementById('weeks-container').innerHTML = html;
  weeks.forEach((_, wi) => updateTotal(wi));
}

function updateTotal(wi) {
  const weeks = getWeeks(currentYear, currentMonth);
  let t = 0;
  weeks[wi].forEach((_, di) => {
    const v = parseFloat(document.getElementById(`h-${wi}-${di}`)?.value || 0);
    if (!isNaN(v)) t += v;
  });
  const s = t.toFixed(1)+'h';
  const b = document.getElementById(`wtot-${wi}`);
  const b2 = document.getElementById(`wtot2-${wi}`);
  if (b)  b.textContent  = s;
  if (b2) b2.textContent = s;
}

async function saveData() {
  const btn = document.getElementById('btn-save');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  status.className = 'save-status loading';
  status.textContent = 'Enregistrement…';

  const weeks = getWeeks(currentYear, currentMonth);
  const entries = [];
  weeks.forEach((days, wi) => {
    days.forEach((day, di) => {
      const h = document.getElementById(`h-${wi}-${di}`)?.value;
      const p = document.getElementById(`p-${wi}-${di}`)?.checked;
      const c = document.getElementById(`c-${wi}-${di}`)?.value;
      const d = document.getElementById(`d-${wi}-${di}`)?.value;
      if (h || c || d || p) {
        entries.push({
          employee: currentUser,
          year: currentYear,
          month: currentMonth,
          day_key: `${wi}-${di}`,
          date_label: `${JOURS[di]} ${fmt(day)}`,
          heures: parseFloat(h)||0,
          panier: p||false,
          chantier: c||'',
          detail: d||''
        });
      }
    });
  });

  try {
    await upsertEntries(entries);
    status.className = 'save-status ok';
    status.textContent = 'Enregistré !';
    setTimeout(() => status.textContent = '', 3000);
  } catch(e) {
    status.className = 'save-status err';
    status.textContent = 'Erreur : ' + e.message;
  }
  btn.disabled = false;
}

// ═══════════════════════════════════════════════════════
//  RÉCAP
// ═══════════════════════════════════════════════════════
async function renderRecap() {
  showLoader(true);
  let saved = {};
  try { saved = await loadEntries(currentUser, currentYear, currentMonth); } catch(e) {}
  showLoader(false);

  const weeks = getWeeks(currentYear, currentMonth);
  let totalH = 0, totalP = 0;
  let rowsHtml = '';
  weeks.forEach((days, wi) => {
    let wh=0, wp=0;
    days.forEach((day, di) => {
      if (day.getMonth()+1 !== currentMonth) return;
      const sv = saved[`${wi}-${di}`]||{};
      wh += parseFloat(sv.heures||0)||0;
      if (sv.panier) wp++;
    });
    totalH += wh; totalP += wp;
    const lun=days[0], ven=days[4];
    rowsHtml += `<div class="week-row-recap">
      <span class="wlbl">Sem. ${fmt(lun)} – ${fmt(ven)}</span>
      <span class="wval">${wh.toFixed(1)}h · ${wp} panier${wp>1?'s':''}</span>
    </div>`;
  });

  document.getElementById('recap-container').innerHTML = `
    <div class="recap-card">
      <h3>${MOIS[currentMonth-1]} ${currentYear}</h3>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val">${totalH.toFixed(1)}h</div><div class="stat-lbl">Heures totales</div></div>
        <div class="stat-box"><div class="stat-val">${totalP}</div><div class="stat-lbl">Paniers repas</div></div>
      </div>
    </div>
    <div class="recap-card"><h3>Détail par semaine</h3>${rowsHtml}</div>`;
}

// ═══════════════════════════════════════════════════════
//  ADMIN
// ═══════════════════════════════════════════════════════
async function loadAdmin() {
  const m = parseInt(document.getElementById('adm-month').value);
  const y = parseInt(document.getElementById('adm-year').value);
  showLoader(true);
  let rows = [];
  try { rows = await loadAllEntries(y, m) || []; } catch(e) {}
  showLoader(false);

  const byEmp = {};
  rows.forEach(r => {
    if (!byEmp[r.employee]) byEmp[r.employee] = {h:0, p:0, entries:[]};
    byEmp[r.employee].h += parseFloat(r.heures)||0;
    if (r.panier) byEmp[r.employee].p++;
    byEmp[r.employee].entries.push(r);
  });

  let html = '';
  EMPLOYEES.forEach(emp => {
    const d = byEmp[emp] || {h:0, p:0, entries:[]};
    const initials = emp.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const detailRows = d.entries.map(e =>
      `<div class="detail-row">
        <span class="dlbl">${e.date_label||e.day_key}</span>
        <span class="dval">${(parseFloat(e.heures)||0).toFixed(1)}h${e.panier?' · panier':''}${e.chantier?' · '+e.chantier:''}</span>
      </div>`
    ).join('');
    html += `<div class="emp-card" onclick="toggleDetail('${emp.replace(/'/g,"\\'")}')">
      <div class="emp-card-head">
        <div>
          <div class="emp-name">${emp}</div>
          <div class="emp-stats">${d.h.toFixed(1)}h · ${d.p} panier${d.p>1?'s':''}</div>
        </div>
        <div class="emp-arrow">›</div>
      </div>
      <div class="emp-detail" id="det-${emp.replace(/\s/g,'_')}">
        ${detailRows || '<div style="font-size:13px;color:#aaa;padding:4px 0">Aucune saisie ce mois-ci</div>'}
      </div>
    </div>`;
  });
  document.getElementById('admin-list').innerHTML = html;
}

function toggleDetail(emp) {
  const id = 'det-' + emp.replace(/\s/g,'_');
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function renderCodes() {
  document.getElementById('codes-list').innerHTML = EMPLOYEES.map(emp =>
    `<div class="code-row">
      <span class="code-name">${emp}</span>
      <span class="code-val">${CODES[emp]}</span>
    </div>`
  ).join('');
}

function showLoader(v) {
  document.getElementById('loader').style.display = v ? 'flex' : 'none';
}

// Init
initSelects();
</script>
